<script>
  // ==========================================
  // AUTOMATED QUARTER ARCHIVE GENERATOR
  // ==========================================
  function generateQuartersList() {
    const START_YEAR = 2026;
    const START_QUARTER = 1; // Changed to 1 so Q1 (verses-2026-q1.txt) is included!
    
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth(); // 0 = Jan, 11 = Dec
    const currentQuarter = Math.floor(currentMonth / 3) + 1; // 1 to 4
    
    const list = [];
    const ROMAN_NUMERALS = ["I", "II", "III", "IV"];
    
    for (let y = currentYear; y >= START_YEAR; y--) {
      const maxQ = (y === currentYear) ? currentQuarter : 4;
      const minQ = (y === START_YEAR) ? START_QUARTER : 1;
      
      for (let q = maxQ; q >= minQ; q--) {
        list.push({
          id: `${y}-q${q}`,
          label: `Telovolana ${ROMAN_NUMERALS[q - 1]}, ${y}`,
          file: `verses-${y}-q${q}.txt`
        });
      }
    }
    return list;
  }

  // Backup fallback template (used only if a file is missing on the server)
  const BACKUP_TEXT = `TELOVOLANA III

MAMPIFANDRAY NY LANITRA SY NY TANY
Kristy ao amin'ny Kolosiana sy Filipiana

---

Teny Faneva vonjimaika

Mbola eo am-panomanana ny teny faneva ho an'ity telovolana ity izahay.
Miverena kely aoriana kely azafady!

Faneva 1:1

---`;

  let archiveList = [];
  let weeksData = [];
  let currentIndex = 0;
  let quarterTitle = "";
  let quarterSubtitle = "";
  let selectedFile = "";

  // 1. Initialize Selector dynamically
  function initSelector() {
    archiveList = generateQuartersList();
    const selectEl = document.getElementById('quarter-select');
    
    selectEl.innerHTML = archiveList.map(item => 
      `<option value="${item.file}">${item.label}</option>`
    ).join('');
    
    // Default to the first one (most recent)
    selectedFile = archiveList[0].file;
  }

  // 2. Fetch selected file
  async function loadVerses(fileName) {
    const container = document.getElementById('app-content');
    container.innerHTML = `<div class="loading">Eo am-pamakiana ny teny faneva...</div>`;
    
    let rawText = "";
    try {
      const response = await fetch(fileName);
      if (response.ok) {
        rawText = await response.text();
      } else {
        // If the file doesn't exist yet, show the friendly holding message
        rawText = BACKUP_TEXT;
      }
    } catch (err) {
      rawText = BACKUP_TEXT;
    }

    parseAndRender(rawText);
  }

  // 3. Flexible and safe block parser
  function parseAndRender(rawText) {
    const lines = rawText.split(/\r?\n/);
    const blocks = [];
    let currentBlock = [];

    for (let line of lines) {
      const trimmed = line.trim();
      if (/^[=-]{3,}$/.test(trimmed)) {
        if (currentBlock.length > 0) {
          blocks.push(currentBlock);
          currentBlock = [];
        }
      } else {
        currentBlock.push(trimmed);
      }
    }
    if (currentBlock.length > 0) {
      blocks.push(currentBlock);
    }

    if (blocks.length === 0) {
      parseAndRender(BACKUP_TEXT);
      return;
    }

    const headerLines = blocks[0].filter(l => l);
    quarterTitle = headerLines[0] || "TELOVOLANA";
    quarterSubtitle = headerLines.slice(1).join(" - ") || "";

    const rawWeeks = blocks.slice(1);
    weeksData = rawWeeks.map((block, index) => {
      const cleanLines = block.filter(l => l);
      if (cleanLines.length === 0) return null;
      
      if (cleanLines.length === 1) {
        return {
          weekNum: index + 1,
          title: cleanLines[0],
          verse: "Tsy misy andinin-tsoratra masina.",
          reference: ""
        };
      } else if (cleanLines.length === 2) {
        return {
          weekNum: index + 1,
          title: cleanLines[0],
          verse: "“ " + cleanLines[1] + " ”",
          reference: ""
        };
      } else {
        return {
          weekNum: index + 1,
          title: cleanLines[0],
          verse: cleanLines.slice(1, cleanLines.length - 1).join('\n'),
          reference: cleanLines[cleanLines.length - 1]
        };
      }
    }).filter(w => w !== null);

    if (weeksData.length === 0) {
      weeksData = [{
        weekNum: 1,
        title: "Fahadisoana",
        verse: "Hamarino tsara ny fanoratana ao amin'ilay rakitra .txt.",
        reference: ""
      }];
    }

    currentIndex = 0;
    renderPage();
  }

  function renderPage() {
    const container = document.getElementById('app-content');
    const currentWeek = weeksData[currentIndex] || weeksData[0];

    container.innerHTML = `
      <div class="quarter-container">
        <div class="quarter-title">${quarterTitle}</div>
        <h1 class="quarter-subtitle">${quarterSubtitle}</h1>
      </div>

      <div class="card">
        <div class="week-indicator">Herinandro faha-${currentWeek.weekNum}</div>
        <h2 class="theme-title">${currentWeek.title}</h2>
        <div class="verse-text">“ ${currentWeek.verse} ”</div>
        <div class="verse-reference">${currentWeek.reference}</div>
      </div>

      <div class="navigation">
        <button class="nav-btn" id="prev-btn" onclick="changeWeek(-1)">← Teo aloha</button>
        <button class="nav-btn" id="next-btn" onclick="changeWeek(1)">Manaraka →</button>
      </div>
    `;

    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').disabled = currentIndex === weeksData.length - 1;
  }

  function changeWeek(direction) {
    currentIndex += direction;
    renderPage();
  }

  function handleQuarterChange(newFile) {
    selectedFile = newFile;
    loadVerses(selectedFile);
  }

  // Run the program
  initSelector();
  loadVerses(selectedFile);
</script>
